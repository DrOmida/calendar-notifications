blueprint:
  name: Calendar Notifications & Actions (+ WhatsApp & HTML5)
  description: >
    # 📅 Calendar Notifications & Actions (+ WhatsApp & HTML5)

    **Version: 2.3-custom-simplified**


    Get notified before calendar events via mobile app, WhatsApp, and/or HTML5 browser push.


    Required = *
  domain: automation
  input:

    # ── Trigger ────────────────────────────────────────────────────────────────
    trigger_settings:
      name: "Trigger *"
      icon: mdi:cog-outline
      collapsed: true
      input:
        calendar:
          name: Calendar *
          description: Select the calendar to use for this automation.
          default: {}
          selector:
            entity:
              filter:
                domain: calendar

        notify_offset:
          name: When to notify *
          description: >
            Choose how far before the calendar event you want to be notified.
          default: "-1"
          selector:
            select:
              options:
                - label: "At the time of the event"
                  value: "0"
                - label: "15 minutes before"
                  value: "-00:15:00"
                - label: "30 minutes before"
                  value: "-00:30:00"
                - label: "1 hour before"
                  value: "-01:00:00"
                - label: "3 hours before"
                  value: "-03:00:00"
                - label: "6 hours before"
                  value: "-06:00:00"
                - label: "1 day before"
                  value: "-1"
                - label: "2 days before"
                  value: "-2"
                - label: "3 days before"
                  value: "-3"
                - label: "1 week before"
                  value: "-7"

        include_calendar_trigger:
          name: Keyword Filtering
          description: >
            Control which calendar events trigger this automation.


            - **Include keyword** — only events containing the keyword(s) will trigger.

            - **Exclude keyword** — all events trigger *except* those with the keyword(s).

            - **No filtering** — all events trigger.
          default: disable_key_word
          selector:
            select:
              options:
                - label: Include keyword
                  value: "enable_key_word"
                - label: Exclude keyword
                  value: "exclude_key_word"
                - label: No keyword filtering (all events trigger)
                  value: "disable_key_word"

        calendar_trigger:
          name: Keyword(s)
          description: >
            Enter a keyword or comma-separated list (e.g. `@reminder, @work`).
            Used when Include or Exclude keyword is selected above.
          default: []
          selector:
            text:

    # ── Mobile App Notify ──────────────────────────────────────────────────────
    mobile_notify_settings:
      name: "Mobile App Notify (Optional)"
      icon: mdi:cellphone-message
      collapsed: true
      input:
        include_start_notify:
          name: Enable Mobile App Notification
          default: disable_start_notify_options
          selector:
            select:
              options:
                - label: Enable
                  value: "enable_start_notify_options"
                - label: Disable
                  value: "disable_start_notify_options"

        start_notify_device:
          name: Devices to Notify
          description: Select one or more devices to receive the notification.
          default: []
          selector:
            device:
              filter:
                - integration: mobile_app
              multiple: true

        start_title:
          name: Notification Title
          default: "{{ trigger.calendar_event.get('summary', '') }}"
          selector:
            text:

        start_message:
          name: Notification Message
          default: "{{ trigger.calendar_event.get('description', '') }}"
          selector:
            text:

        start_notify_tag:
          name: Notification Tag (Optional)
          description: Use a short unique tag like `calendar-reminder` to avoid duplicate notifications.
          default: []
          selector:
            text:

        start_notify_interruption_level:
          name: Interruption Level — iOS Only
          default: active
          selector:
            select:
              mode: dropdown
              options:
                - label: Default
                  value: "active"
                - label: Critical
                  value: "critical"
                - label: Time Sensitive
                  value: "time-sensitive"
                - label: Quiet
                  value: "passive"

        start_notify_sound:
          name: Notification Sound — iOS Only
          description: Enter a sound filename including extension.
          default: []
          selector:
            text:

        start_notify_data:
          name: Android Options (Optional)
          default: []
          selector:
            select:
              multiple: true
              options:
                - label: High Priority
                  value: "high_priority"
                - label: Sticky Notification
                  value: "sticky"
                - label: Notification Channel
                  value: "channel"
                - label: Custom Icon
                  value: "icon"

        start_notify_channel:
          name: Notification Channel — Android Only
          default: []
          selector:
            text:

        start_notify_icon:
          name: Icon — Android Only
          default: "mdi:calendar-month-outline"
          selector:
            icon:

        start_notify_icon_colour:
          name: Icon Colour — Android Only
          default: [41, 121, 255]
          selector:
            color_rgb:

    # ── WhatsApp Notify ────────────────────────────────────────────────────────
    whatsapp_notify_settings:
      name: "WhatsApp Notify (Optional)"
      icon: mdi:whatsapp
      collapsed: true
      input:
        include_whatsapp_notify:
          name: Enable WhatsApp Notification
          description: >
            Requires `rest_command.whatsapp` (or similar) in your `configuration.yaml`.
          default: disable_whatsapp_notify
          selector:
            select:
              options:
                - label: Enable
                  value: "enable_whatsapp_notify"
                - label: Disable
                  value: "disable_whatsapp_notify"

        whatsapp_service:
          name: WhatsApp REST Command
          description: >
            Select your WhatsApp rest_command service. You can also type a custom value.
          default: rest_command.whatsapp
          selector:
            select:
              custom_value: true
              options:
                - rest_command.whatsapp

        whatsapp_message:
          name: WhatsApp Message
          description: >
            Available variables:

            - `{{ trigger.calendar_event.summary }}` — event title

            - `{{ trigger.calendar_event.start }}` — event start

            - `{{ trigger.calendar_event.description }}` — event description
          default: >-
            📅 In 1 day you have: {{ trigger.calendar_event.summary }}
            🗓 View your agenda: https://calendar.google.com
          selector:
            text:
              multiline: true

    # ── HTML5 Notify ───────────────────────────────────────────────────────────
    html5_notify_settings:
      name: "HTML5 Browser Notify (Optional)"
      icon: mdi:bell-ring-outline
      collapsed: true
      input:
        include_html5_notify:
          name: Enable HTML5 Notification
          description: >
            Requires the HTML5 push notification integration in Home Assistant.
          default: disable_html5_notify
          selector:
            select:
              options:
                - label: Enable
                  value: "enable_html5_notify"
                - label: Disable
                  value: "disable_html5_notify"

        html5_notify_target:
          name: HTML5 Notify Service
          description: >
            Select your HTML5 notify service. You can also type a custom value (e.g. `notify.html5_john`).
          default: notify.html5
          selector:
            select:
              custom_value: true
              options:
                - notify.html5

        html5_title:
          name: HTML5 Notification Title
          default: "📅 Calendar Reminder"
          selector:
            text:

        html5_message:
          name: HTML5 Notification Message
          default: "In 1 day you have: {{ trigger.calendar_event.summary }}"
          selector:
            text:
              multiline: true

        html5_url:
          name: HTML5 Click URL (Optional)
          description: URL to open when the notification is clicked.
          default: "https://calendar.google.com"
          selector:
            text:

    # ── Action Buttons ─────────────────────────────────────────────────────────
    start_action_settings:
      name: "Action Buttons (Optional)"
      icon: mdi:gesture-tap
      collapsed: true
      input:
        include_start_action_buttons:
          name: Enable Action Buttons
          description: Add up to 3 buttons to the mobile notification.
          default: []
          selector:
            select:
              options:
                - label: Enable action button 1
                  value: "enable_start_action_button_1"
                - label: Enable action button 2
                  value: "enable_start_action_button_2"
                - label: Enable action button 3
                  value: "enable_start_action_button_3"
              multiple: true

        start_action_button_1:
          name: Action Button 1 Label
          default: []
          selector:
            text:

        start_action_button_2:
          name: Action Button 2 Label
          default: []
          selector:
            text:

        start_action_button_3:
          name: Action Button 3 Label
          default: []
          selector:
            text:

        start_action_button_stop:
          name: Cancel Button Label
          default: []
          selector:
            text:

        start_time_delay:
          name: Time to wait for button press
          default:
            hours: 0
            minutes: 30
            seconds: 0
          selector:
            duration:

        include_start_action_button_confirmation:
          name: Send confirmation when button is pressed
          default: disable_start_action_button_confirmation
          selector:
            select:
              options:
                - label: Enable
                  value: "enable_start_action_button_confirmation"
                - label: Disable
                  value: "disable_start_action_button_confirmation"

        start_action_button_confirmation_title:
          name: Confirmation Notification Title
          default: []
          selector:
            text:

        start_action_button_confirmation_message:
          name: Button 1 Confirmation Message
          default: []
          selector:
            text:

        start_action_button_2_confirmation_message:
          name: Button 2 Confirmation Message
          default: []
          selector:
            text:

        start_action_button_3_confirmation_message:
          name: Button 3 Confirmation Message
          default: []
          selector:
            text:

        start_action_button_stop_confirmation_message:
          name: Cancel Button Confirmation Message
          default: []
          selector:
            text:

        start_time_delay_confirmation_message:
          name: Time Delay Confirmation Message
          default: []
          selector:
            text:

    # ── Custom Actions ─────────────────────────────────────────────────────────
    start_auto_action_settings:
      name: "Custom Actions (Optional)"
      icon: mdi:code-tags
      collapsed: true
      input:
        include_start_auto_actions:
          name: Enable Auto Actions
          description: These actions run automatically when the event triggers (no button press needed).
          default: []
          selector:
            select:
              options:
                - label: Enable auto action 1
                  value: "enable_start_action_1"
                - label: Enable auto action 2
                  value: "enable_start_action_2"
                - label: Enable auto action 3
                  value: "enable_start_action_3"
              multiple: true

        start_action_1:
          name: Action 1
          default: []
          selector:
            action:

        start_action_2:
          name: Action 2
          default: []
          selector:
            action:

        start_action_3:
          name: Action 3
          default: []
          selector:
            action:

    # ── Test Mode ──────────────────────────────────────────────────────────────
    test_settings:
      name: "🧪 Test Mode (Optional)"
      icon: mdi:flask-outline
      collapsed: true
      input:
        test_event_name:
          name: Test — Fake Event Name
          description: >
            The fake calendar event name used when running a test.
            Replaces `{{ trigger.calendar_event.summary }}` in your messages.
          default: "Test Event"
          selector:
            text:

        test_event_description:
          name: Test — Fake Event Description
          description: >
            The fake event description used when running a test.
            Replaces `{{ trigger.calendar_event.description }}` in your messages.
          default: "This is a test notification from your calendar blueprint."
          selector:
            text:

    # ── Global Conditions ──────────────────────────────────────────────────────
    global_conditions_settings:
      name: "Global Conditions (Optional)"
      icon: mdi:earth
      collapsed: true
      input:
        global_conditions:
          name: Global Conditions
          default: []
          selector:
            condition:

mode: parallel
max_exceeded: silent

variables:
  calendar: !input calendar
  notify_offset: !input notify_offset
  include_calendar_trigger: !input include_calendar_trigger
  calendar_trigger: !input calendar_trigger
  include_start_notify: !input include_start_notify
  start_notify_device: !input start_notify_device
  start_title: !input start_title
  start_message: !input start_message
  start_notify_tag: !input start_notify_tag
  start_notify_interruption_level: !input start_notify_interruption_level
  start_notify_sound: !input start_notify_sound
  start_notify_data: !input start_notify_data
  start_notify_channel: !input start_notify_channel
  start_notify_icon: !input start_notify_icon
  start_notify_icon_colour: !input start_notify_icon_colour
  include_whatsapp_notify: !input include_whatsapp_notify
  whatsapp_service: !input whatsapp_service
  whatsapp_message: !input whatsapp_message
  include_html5_notify: !input include_html5_notify
  html5_notify_target: !input html5_notify_target
  html5_title: !input html5_title
  html5_message: !input html5_message
  html5_url: !input html5_url
  include_start_action_buttons: !input include_start_action_buttons
  start_action_button_1: !input start_action_button_1
  start_action_button_2: !input start_action_button_2
  start_action_button_3: !input start_action_button_3
  start_action_button_stop: !input start_action_button_stop
  start_time_delay: !input start_time_delay
  include_start_action_button_confirmation: !input include_start_action_button_confirmation
  start_action_button_confirmation_title: !input start_action_button_confirmation_title
  start_action_button_confirmation_message: !input start_action_button_confirmation_message
  start_action_button_2_confirmation_message: !input start_action_button_2_confirmation_message
  start_action_button_3_confirmation_message: !input start_action_button_3_confirmation_message
  start_action_button_stop_confirmation_message: !input start_action_button_stop_confirmation_message
  start_time_delay_confirmation_message: !input start_time_delay_confirmation_message
  include_start_auto_actions: !input include_start_auto_actions
  start_action_1: !input start_action_1
  start_action_2: !input start_action_2
  start_action_3: !input start_action_3
  global_conditions: !input global_conditions
  test_event_name: !input test_event_name
  test_event_description: !input test_event_description

triggers:
  - trigger: calendar
    id: "calendar_trigger"
    event: start
    entity_id: !input calendar
    offset: !input notify_offset
  - trigger: event
    id: "test_trigger"
    event_type: blueprint_calendar_test
    event_data:
      automation_id: "{{ this.entity_id }}"

condition:
  - condition: or
    conditions:
      - alias: "Test trigger — always allow"
        condition: template
        value_template: "{{ trigger.id == 'test_trigger' }}"
      - alias: "Calendar trigger — check notifications enabled"
        condition: and
        conditions:
          - condition: template
            value_template: >-
              {{ ('enable_start_notify_options' in include_start_notify)
                 or ('enable_start_action_1' in include_start_auto_actions)
                 or ('enable_start_action_2' in include_start_auto_actions)
                 or ('enable_start_action_3' in include_start_auto_actions)
                 or (include_whatsapp_notify == 'enable_whatsapp_notify')
                 or (include_html5_notify == 'enable_html5_notify') }}
          - condition: or
            conditions:
              - alias: "No keyword filtering"
                condition: template
                value_template: "{{ include_calendar_trigger == 'disable_key_word' }}"
              - alias: "Include keyword"
                condition: and
                conditions:
                  - condition: template
                    value_template: "{{ include_calendar_trigger == 'enable_key_word' }}"
                  - condition: template
                    value_template: >
                      {% set keywords = (calendar_trigger or '') | string %}
                      {% set keyword_list = keywords.split(',') | map('trim') | list %}
                      {% set summary = trigger.calendar_event.get('summary', '') %}
                      {% set description = trigger.calendar_event.get('description', '') %}
                      {{ keyword_list | select('in', summary ~ description) | list | count > 0 }}
              - alias: "Exclude keyword"
                condition: and
                conditions:
                  - condition: template
                    value_template: "{{ include_calendar_trigger == 'exclude_key_word' }}"
                  - condition: template
                    value_template: >
                      {% set keywords = (calendar_trigger or '') | string %}
                      {% set keyword_list = keywords.split(',') | map('trim') | list %}
                      {% set summary = trigger.calendar_event.get('summary', '') %}
                      {% set description = trigger.calendar_event.get('description', '') %}
                      {{ keyword_list | select('in', summary ~ description) | list | count == 0 }}
          - condition: and
            conditions: !input global_conditions

action:

  # ── Resolve event data (real or test) ──────────────────────────────────────
  - variables:
      event_summary: >-
        {% if trigger.id == 'test_trigger' %}
          {{ test_event_name }}
        {% else %}
          {{ trigger.calendar_event.get('summary', '') }}
        {% endif %}
      event_description: >-
        {% if trigger.id == 'test_trigger' %}
          {{ test_event_description }}
        {% else %}
          {{ trigger.calendar_event.get('description', '') }}
        {% endif %}
      resolved_whatsapp_message: >-
        {{ whatsapp_message
            | replace('trigger.calendar_event.summary', 'event_summary')
            | replace('trigger.calendar_event.description', 'event_description') }}
      resolved_html5_message: >-
        {{ html5_message
            | replace('trigger.calendar_event.summary', 'event_summary')
            | replace('trigger.calendar_event.description', 'event_description') }}
      resolved_start_title: >-
        {{ start_title
            | replace('trigger.calendar_event.summary', 'event_summary')
            | replace('trigger.calendar_event.description', 'event_description') }}
      resolved_start_message: >-
        {{ start_message
            | replace('trigger.calendar_event.summary', 'event_summary')
            | replace('trigger.calendar_event.description', 'event_description') }}

  # ── WhatsApp ────────────────────────────────────────────────────────────────
  - choose:
    - alias: "Send WhatsApp notification if enabled"
      conditions:
        - condition: template
          value_template: "{{ include_whatsapp_notify == 'enable_whatsapp_notify' }}"
      sequence:
        - action: "{{ whatsapp_service }}"
          data:
            message: >-
              {{ whatsapp_message
                  | replace('{{ trigger.calendar_event.summary }}', event_summary)
                  | replace('{{ trigger.calendar_event.description }}', event_description) }}

  # ── HTML5 ───────────────────────────────────────────────────────────────────
  - choose:
    - alias: "Send HTML5 notification if enabled"
      conditions:
        - condition: template
          value_template: "{{ include_html5_notify == 'enable_html5_notify' }}"
      sequence:
        - action: "{{ html5_notify_target }}"
          data:
            title: >-
              {{ html5_title
                  | replace('{{ trigger.calendar_event.summary }}', event_summary)
                  | replace('{{ trigger.calendar_event.description }}', event_description) }}
            message: >-
              {{ html5_message
                  | replace('{{ trigger.calendar_event.summary }}', event_summary)
                  | replace('{{ trigger.calendar_event.description }}', event_description) }}
            data:
              url: "{{ html5_url }}"

  # ── Mobile App ──────────────────────────────────────────────────────────────
  - choose:
    - alias: "Send mobile app notification if enabled"
      conditions:
        - condition: template
          value_template: "{{ include_start_notify == 'enable_start_notify_options' }}"
      sequence:
        - variables:
            action_button_1: "{{ 'BUTTON_1_' ~ context.id }}"
            action_button_2: "{{ 'BUTTON_2_' ~ context.id }}"
            action_button_3: "{{ 'BUTTON_3_' ~ context.id }}"
            action_button_stop: "{{ 'BUTTON_STOP_' ~ context.id }}"
            start_message_data: >-
              {% set message = namespace(data={}) %}
              {% set push = namespace(data={}) %}
              {% if start_notify_interruption_level in ['active', 'critical', 'time-sensitive', 'passive'] %}
                {% set push.data = dict(push.data, **{ 'interruption-level': start_notify_interruption_level }) %}
              {% endif %}
              {% if start_notify_sound != [] %}
                {% set push.data = dict(push.data, **{ 'sound': start_notify_sound }) %}
              {% endif %}
              {% if push.data %}
                {% set message.data = dict(message.data, **{ 'push': push.data }) %}
              {% endif %}
              {% if 'high_priority' in start_notify_data %}
                {% set message.data = dict(message.data, **{ 'ttl': 0, 'priority': 'high' }) %}
              {% endif %}
              {% if 'channel' in start_notify_data %}
                {% set message.data = dict(message.data, **{ 'channel': start_notify_channel }) %}
              {% endif %}
              {% if 'sticky' in start_notify_data %}
                {% set message.data = dict(message.data, **{ 'sticky': "true" }) %}
              {% endif %}
              {% if 'icon' in start_notify_data %}
                {% set message.data = dict(message.data, **{ 'notification_icon': start_notify_icon }) %}
                {% if start_notify_icon_colour | length == 3 %}
                  {% set icon_colour = '#%02x%02x%02x' | format(start_notify_icon_colour[0], start_notify_icon_colour[1], start_notify_icon_colour[2]) %}
                  {% set message.data = dict(message.data, **{ 'color': icon_colour }) %}
                {% endif %}
              {% endif %}
              {% if start_notify_tag != [] %}
                {% set message.data = dict(message.data, **{ 'tag': start_notify_tag }) %}
              {% endif %}
              {{ message.data }}
            start_message_data_action_button: >-
              {% set message = namespace(data={}) %}
              {% set push = namespace(data={}) %}
              {% set actions = [] %}
              {% if start_notify_interruption_level in ['active', 'critical', 'time-sensitive', 'passive'] %}
                {% set push.data = dict(push.data, **{ 'interruption-level': start_notify_interruption_level }) %}
              {% endif %}
              {% if start_notify_sound != [] %}
                {% set push.data = dict(push.data, **{ 'sound': start_notify_sound }) %}
              {% endif %}
              {% if push.data %}
                {% set message.data = dict(message.data, **{ 'push': push.data }) %}
              {% endif %}
              {% if 'high_priority' in start_notify_data %}
                {% set message.data = dict(message.data, **{ 'ttl': 0, 'priority': 'high' }) %}
              {% endif %}
              {% if 'channel' in start_notify_data %}
                {% set message.data = dict(message.data, **{ 'channel': start_notify_channel }) %}
              {% endif %}
              {% if 'sticky' in start_notify_data %}
                {% set message.data = dict(message.data, **{ 'sticky': "true" }) %}
              {% endif %}
              {% if 'icon' in start_notify_data %}
                {% set message.data = dict(message.data, **{ 'notification_icon': start_notify_icon }) %}
                {% if start_notify_icon_colour | length == 3 %}
                  {% set icon_colour = '#%02x%02x%02x' | format(start_notify_icon_colour[0], start_notify_icon_colour[1], start_notify_icon_colour[2]) %}
                  {% set message.data = dict(message.data, **{ 'color': icon_colour }) %}
                {% endif %}
              {% endif %}
              {% if start_notify_tag != [] %}
                {% set message.data = dict(message.data, **{ 'tag': start_notify_tag }) %}
              {% endif %}
              {% if 'enable_start_action_button_1' in include_start_action_buttons %}
                {% set actions = actions + [{ 'action': action_button_1, 'title': start_action_button_1 }] %}
              {% endif %}
              {% if 'enable_start_action_button_2' in include_start_action_buttons %}
                {% set actions = actions + [{ 'action': action_button_2, 'title': start_action_button_2 }] %}
              {% endif %}
              {% if 'enable_start_action_button_3' in include_start_action_buttons %}
                {% set actions = actions + [{ 'action': action_button_3, 'title': start_action_button_3 }] %}
              {% endif %}
              {% if ('enable_start_action_button_1' in include_start_action_buttons) or
                    ('enable_start_action_button_2' in include_start_action_buttons) or
                    ('enable_start_action_button_3' in include_start_action_buttons) %}
                {% set actions = actions + [{ 'action': action_button_stop, 'title': start_action_button_stop }] %}
              {% endif %}
              {% if actions | length > 0 %}
                {% set message.data = dict(message.data, **{ 'actions': actions }) %}
              {% endif %}
              {{ message.data }}
        - alias: "Send notification to each device"
          repeat:
            for_each: !input start_notify_device
            sequence:
              - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                data:
                  title: !input start_title
                  message: !input start_message
                  data: "{{ start_message_data_action_button }}"
        - choose:
          - alias: "Action buttons are enabled — wait for response"
            conditions:
              - condition: template
                value_template: >-
                  {{ ('enable_start_action_button_1' in include_start_action_buttons)
                     or ('enable_start_action_button_2' in include_start_action_buttons)
                     or ('enable_start_action_button_3' in include_start_action_buttons) }}
            sequence:
              - wait_for_trigger:
                  - trigger: event
                    event_type: mobile_app_notification_action
                    event_data:
                      action: "{{ action_button_1 }}"
                  - trigger: event
                    event_type: mobile_app_notification_action
                    event_data:
                      action: "{{ action_button_2 }}"
                  - trigger: event
                    event_type: mobile_app_notification_action
                    event_data:
                      action: "{{ action_button_3 }}"
                  - trigger: event
                    event_type: mobile_app_notification_action
                    event_data:
                      action: "{{ action_button_stop }}"
                timeout: !input start_time_delay
              - choose:
                - alias: "Confirmation enabled"
                  conditions:
                    - condition: template
                      value_template: "{{ 'enable_start_action_button_confirmation' in include_start_action_button_confirmation }}"
                  sequence:
                    - if:
                      - condition: template
                        value_template: "{{ wait.trigger.idx is defined }}"
                      then:
                        - choose:
                          - conditions: "{{ action_button_1 in wait.trigger.event.data.action }}"
                            sequence:
                              - repeat:
                                  for_each: !input start_notify_device
                                  sequence:
                                    - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                                      data:
                                        title: !input start_action_button_confirmation_title
                                        message: !input start_action_button_confirmation_message
                                        data: "{{ start_message_data }}"
                          - conditions: "{{ action_button_2 in wait.trigger.event.data.action }}"
                            sequence:
                              - repeat:
                                  for_each: !input start_notify_device
                                  sequence:
                                    - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                                      data:
                                        title: !input start_action_button_confirmation_title
                                        message: !input start_action_button_2_confirmation_message
                                        data: "{{ start_message_data }}"
                          - conditions: "{{ action_button_3 in wait.trigger.event.data.action }}"
                            sequence:
                              - repeat:
                                  for_each: !input start_notify_device
                                  sequence:
                                    - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                                      data:
                                        title: !input start_action_button_confirmation_title
                                        message: !input start_action_button_3_confirmation_message
                                        data: "{{ start_message_data }}"
                          - conditions: "{{ action_button_stop in wait.trigger.event.data.action }}"
                            sequence:
                              - repeat:
                                  for_each: !input start_notify_device
                                  sequence:
                                    - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                                      data:
                                        title: !input start_action_button_confirmation_title
                                        message: !input start_action_button_stop_confirmation_message
                                        data: "{{ start_message_data }}"
                        - choose:
                          - conditions: "{{ wait.trigger.event.data.action == action_button_1 }}"
                            sequence: !input start_action_1
                          - conditions: "{{ wait.trigger.event.data.action == action_button_2 }}"
                            sequence: !input start_action_2
                          - conditions: "{{ wait.trigger.event.data.action == action_button_3 }}"
                            sequence: !input start_action_3
                          - conditions: "{{ wait.trigger.event.data.action == action_button_stop }}"
                            sequence:
                              - stop: "Stop the automation"
                      else:
                        - repeat:
                            for_each: !input start_notify_device
                            sequence:
                              - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
                                data:
                                  title: !input start_action_button_confirmation_title
                                  message: !input start_time_delay_confirmation_message
                                  data: "{{ start_message_data }}"
                - alias: "Confirmation disabled"
                  conditions:
                    - condition: template
                      value_template: "{{ 'disable_start_action_button_confirmation' in include_start_action_button_confirmation }}"
                  sequence:
                    - if:
                      - condition: template
                        value_template: "{{ wait.trigger.idx is defined }}"
                      then:
                        - choose:
                          - conditions: "{{ wait.trigger.event.data.action == action_button_1 }}"
                            sequence: !input start_action_1
                          - conditions: "{{ wait.trigger.event.data.action == action_button_2 }}"
                            sequence: !input start_action_2
                          - conditions: "{{ wait.trigger.event.data.action == action_button_3 }}"
                            sequence: !input start_action_3
                          - conditions: "{{ wait.trigger.event.data.action == action_button_stop }}"
                            sequence:
                              - stop: "Stop the automation"

  # ── Auto Actions ────────────────────────────────────────────────────────────
  - choose:
    - alias: "Auto action 1"
      conditions:
        - condition: template
          value_template: "{{ 'enable_start_action_1' in include_start_auto_actions }}"
      sequence: !input start_action_1
  - choose:
    - alias: "Auto action 2"
      conditions:
        - condition: template
          value_template: "{{ 'enable_start_action_2' in include_start_auto_actions }}"
      sequence: !input start_action_2
  - choose:
    - alias: "Auto action 3"
      conditions:
        - condition: template
          value_template: "{{ 'enable_start_action_3' in include_start_auto_actions }}"
      sequence: !input start_action_3
