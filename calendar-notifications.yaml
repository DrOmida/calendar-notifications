blueprint:
  name: Calendar Notifications & Actions (+ WhatsApp & HTML5)
  description: >
    # 📅 Calendar Notifications & Actions (+ WhatsApp & HTML5)

    **Version: 2.3-custom**


    Transform Your Calendar: Turn Events Into Notifications and Actions! 📅🔔⚙️

    This version adds **WhatsApp** and **HTML5** notification support on top of the original blueprint by Blackshome.


    Required = *
  domain: automation
  input:
    trigger_settings:
      name: "Trigger *"
      icon: mdi:cog-outline
      description: ⚠️ Calendar events must be added at least 15 minutes before the trigger time, otherwise the automation will not execute.
      collapsed: true
      input:
        calendar:
          name: Calendar *
          description: >
            Select the calendar to be used for the automation.
          default: {}
          selector:
            entity:
              filter:
                domain: calendar
        include_calendar_trigger:
          name: Calendar Trigger - Keyword(s) for Calendar Events
          description: >
            Control how calendar events trigger this automation using an optional **Keyword**.


            - **Include Keyword** - Only calendar events containing the keyword(s) in the summary or description will trigger the automation.


            - **Exclude Keyword** - All calendar events will trigger **except** those that contain the keyword(s).


            - **No Keyword Filtering** - All calendar events will trigger the automation.


            The keyword is checked in both the calendar **event summary** and **event description**.
          default: enable_key_word
          selector:
            select:
              options:
                - label: Include keyword
                  value: "enable_key_word"
                - label: Exclude keyword
                  value: "exclude_key_word"
                - label: No keyword filtering (all events trigger)
                  value: "disable_key_word"
        calendar_trigger:
          name: Calendar Trigger - Keyword(s)
          description: >
            If you selected **Include Keyword** or **Exclude Keyword** above then enter a single keyword, or a comma-separated list of keywords, to trigger this automation.
          default: []
          selector:
            text:
        start_calendar_offset:
          name: Calendar Start - Offset
          description: >
            You can specify an offset from the start of the calendar event for when the trigger should be activated.
            To trigger the automation before the start of the event, use a negative sign "-" followed by the time value.
          default:
            days: 0
            hours: 0
            minutes: 0
            seconds: 0
          selector:
            duration:
              enable_day: true
        end_calendar_offset:
          name: Calendar End - Offset
          description: >
            You can specify an offset from the end of the calendar event for when the trigger should be activated.
            To trigger the automation before the end of the event, use a negative sign "-" followed by the time value.
          default:
            days: 0
            hours: 0
            minutes: 0
            seconds: 0
          selector:
            duration:
              enable_day: true

    start_notify_settings:
      name: "Start Notify"
      icon: mdi:calendar-start-outline
      collapsed: true
      input:
        include_start_notify:
          name: Use The Start Notify Options (Optional)
          description: >
            Select **Enable** if you would like to receive notifications at the start of the calendar event.
          default: disable_start_notify_options
          selector:
            select:
              options:
                - label: Enable Start Notify Options
                  value: "enable_start_notify_options"
                - label: Disable Start Notify Options
                  value: "disable_start_notify_options"
        start_notify_device:
          name: Start Notify - Devices To Notify
          description: >
            Select the devices to receive notifications at the start of a calendar event.
          default: []
          selector:
            device:
              filter:
                - integration: mobile_app
              multiple: true
        start_title:
          name: Start Notify - Title
          description: >
            Specify the notification title for the start of the calendar event.
          default: "{{ trigger.calendar_event.get('summary', '') }}"
          selector:
            text:
        start_message:
          name: Start Notify - Message
          description: >
            Specify the notification message for the start of the calendar event.
          default: "{{ trigger.calendar_event.get('description', '') }}"
          selector:
            text:
        start_notify_tag:
          name: Notification Tag
          description: >
            Use a tag to keep your notifications organized.
          default: []
          selector:
            text:
        start_notify_interruption_level:
          name: Interruption Level - iOS Only
          description: >
            On devices running iOS 15 and later, you can configure the interruption level for your notifications.
          default: active
          selector:
            select:
              mode: dropdown
              options:
                - label: Default
                  value: "active"
                - label: Critical Notifications
                  value: "critical"
                - label: Time Sensitive Notifications
                  value: "time-sensitive"
                - label: Quiet Notifications Without Waking Screen
                  value: "passive"
        start_notify_sound:
          name: Notification Sound - iOS Only
          description: >
            Enter a sound filename including extension for iOS notifications.
          default: []
          selector:
            text:
        start_notify_data:
          name: Android Only Options (Optional)
          default: []
          selector:
            select:
              multiple: true
              options:
                - label: High Priority
                  value: "high_priority"
                - label: Sticky Notification
                  value: "sticky"
                - label: Notification Channel
                  value: "channel"
                - label: Icon
                  value: "icon"
        start_notify_channel:
          name: Notification Channel - Android Only
          default: []
          selector:
            text:
        start_notify_icon:
          name: Icon - Android Only
          default: "mdi:calendar-month-outline"
          selector:
            icon:
        start_notify_icon_colour:
          name: Icon Colour - Android Only
          default: [41, 121, 255]
          selector:
            color_rgb:

    # ─── WhatsApp Notify (Start) ───────────────────────────────────────────────
    whatsapp_notify_settings:
      name: "WhatsApp Notify (Start)"
      icon: mdi:whatsapp
      collapsed: true
      input:
        include_whatsapp_notify:
          name: Use WhatsApp Notification (Optional)
          description: >
            Select **Enable** to send a WhatsApp message at the start of the calendar event (or at the offset you configured).
            Requires `rest_command.whatsapp` to be configured in your `configuration.yaml`.
          default: disable_whatsapp_notify
          selector:
            select:
              options:
                - label: Enable WhatsApp Notification
                  value: "enable_whatsapp_notify"
                - label: Disable WhatsApp Notification
                  value: "disable_whatsapp_notify"
        whatsapp_message:
          name: WhatsApp - Message
          description: >
            The message to send via WhatsApp. You can use the following variables:

            - `{{ trigger.calendar_event.summary }}` — event title

            - `{{ trigger.calendar_event.start }}` — event start date/time

            - `{{ trigger.calendar_event.description }}` — event description


            The default message uses your configured offset to say "In X day(s)" automatically.
          default: >-
            📅 In 1 day you have: {{ trigger.calendar_event.summary }}
            🗓 View your agenda: https://calendar.google.com
          selector:
            text:
              multiline: true

    # ─── HTML5 Notify (Start) ──────────────────────────────────────────────────
    html5_notify_settings:
      name: "HTML5 Notify (Start)"
      icon: mdi:bell-ring-outline
      collapsed: true
      input:
        include_html5_notify:
          name: Use HTML5 Notification (Optional)
          description: >
            Select **Enable** to send an HTML5 browser push notification at the start of the calendar event.
            Requires the HTML5 notify integration to be set up in Home Assistant.
          default: disable_html5_notify
          selector:
            select:
              options:
                - label: Enable HTML5 Notification
                  value: "enable_html5_notify"
                - label: Disable HTML5 Notification
                  value: "disable_html5_notify"
        html5_notify_target:
          name: HTML5 - Notification Target
          description: >
            Enter the target for the HTML5 notification. This is the name after `notify.` for your HTML5 integration.
            For example, if your service is `notify.html5`, enter `html5`.
            If you have a named target like `notify.html5_john`, enter `html5_john`.
          default: "html5"
          selector:
            text:
        html5_title:
          name: HTML5 - Title
          description: >
            The title for the HTML5 browser push notification.
          default: "📅 Calendar Reminder"
          selector:
            text:
        html5_message:
          name: HTML5 - Message
          description: >
            The message for the HTML5 browser push notification. You can use the same variables as the WhatsApp message.
          default: >-
            In 1 day you have: {{ trigger.calendar_event.summary }}
          selector:
            text:
              multiline: true
        html5_url:
          name: HTML5 - Action URL (Optional)
          description: >
            A URL to open when the notification is clicked. For example your Google Calendar link.
          default: "https://calendar.google.com"
          selector:
            text:

    start_action_settings:
      name: "Start Actions Buttons"
      icon: mdi:gesture-tap
      collapsed: true
      input:
        include_start_action_buttons:
          name: Start Notify - Action Buttons Options (Optional)
          default: []
          selector:
            select:
              options:
                - label: Enable action button 1
                  value: "enable_start_action_button_1"
                - label: Enable action button 2
                  value: "enable_start_action_button_2"
                - label: Enable action button 3
                  value: "enable_start_action_button_3"
              multiple: true
        start_action_button_1:
          name: Start Notify - Action Button 1
          default: []
          selector:
            text:
        start_action_button_2:
          name: Start Notify - Action Button 2
          default: []
          selector:
            text:
        start_action_button_3:
          name: Start Notify - Action Button 3
          default: []
          selector:
            text:
        start_action_button_stop:
          name: Start Notify - CANCEL Action Button
          default: []
          selector:
            text:
        start_time_delay:
          name: Start Notify - Time Delay
          default:
            hours: 0
            minutes: 30
            seconds: 0
          selector:
            duration:
        include_start_action_button_confirmation:
          name: Start Notify - Action Button Confirmation Option (Optional)
          default: disable_start_action_button_confirmation
          selector:
            select:
              options:
                - label: Enable Action Button Confirmation
                  value: "enable_start_action_button_confirmation"
                - label: Disable Action Button Confirmation
                  value: "disable_start_action_button_confirmation"
        start_action_button_confirmation_title:
          name: Start Notify - Action Button Confirmation Title
          default: []
          selector:
            text:
        start_action_button_confirmation_message:
          name: Start Notify - Action Button 1 Confirmation Message
          default: []
          selector:
            text:
        start_action_button_2_confirmation_message:
          name: Start Notify - Action Button 2 Confirmation Message
          default: []
          selector:
            text:
        start_action_button_3_confirmation_message:
          name: Start Notify - Action Button 3 Confirmation Message
          default: []
          selector:
            text:
        start_action_button_stop_confirmation_message:
          name: Start Notify - Action Button Cancel Confirmation Message
          default: []
          selector:
            text:
        start_time_delay_confirmation_message:
          name: Start Notify - Time Delay Confirmation Message
          default: []
